<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BON offline</title>
    <meta name="theme-color" content="#2563EB">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: #070b1f;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(37, 99, 235, 0.16), transparent 32%),
                radial-gradient(circle at 82% 18%, rgba(236, 72, 153, 0.14), transparent 32%),
                linear-gradient(180deg, #f8faff 0%, #f5f7ff 54%, #fff7fb 100%);
        }
        .card {
            width: min(100%, 460px);
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.76);
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 24px 70px rgba(30, 64, 175, 0.10);
            backdrop-filter: blur(22px);
            text-align: center;
        }
        .mark {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            display: grid;
            place-items: center;
            border-radius: 22px;
            color: white;
            font-size: 30px;
            font-weight: 900;
            background: linear-gradient(135deg, #2563eb, #7c3aed 52%, #ec4899);
            box-shadow: 0 18px 44px rgba(79, 70, 229, 0.24);
        }
        h1 { margin: 0; font-size: 24px; line-height: 1.15; }
        p { margin: 12px 0 0; color: #64748b; line-height: 1.7; }
        button {
            margin-top: 22px;
            min-height: 48px;
            border: 0;
            border-radius: 18px;
            padding: 0 20px;
            color: white;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #7c3aed 52%, #ec4899);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="mark">B</div>
        <h1>Няма интернет връзка.</h1>
        <p>Моля, опитайте отново. BON ще зареди приложението, когато връзката се възстанови.</p>
        <button type="button" onclick="window.location.reload()">Опитай отново</button>
    </main>
</body>
</html>
